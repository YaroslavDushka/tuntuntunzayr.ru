<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тун Тун Тун Заур — Лиги Мастер/Про + день рождения мамы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2f; color: #fff; overflow: hidden; height: 100vh; transition: background 0.3s; }
        body.mom-birthday {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.15"><circle cx="20" cy="20" r="6" fill="pink"/><circle cx="80" cy="30" r="8" fill="hotpink"/><circle cx="50" cy="80" r="7" fill="lightpink"/><circle cx="10" cy="70" r="5" fill="pink"/><circle cx="90" cy="85" r="6" fill="hotpink"/><circle cx="40" cy="10" r="4" fill="lightpink"/><circle cx="70" cy="55" r="9" fill="pink"/><circle cx="30" cy="50" r="5" fill="hotpink"/><circle cx="85" cy="15" r="4" fill="lightpink"/></svg>') repeat;
            background-size: 60px;
        }
        .flower-decoration {
            position: fixed;
            pointer-events: none;
            font-size: 32px;
            animation: floatFlower 12s infinite linear;
            z-index: 999;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
        }
        @keyframes floatFlower {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        #app { position: relative; width: 100%; height: 100%; }
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 70px);
            overflow-y: auto; padding: 20px; transition: transform 0.35s ease, opacity 0.35s ease;
            transform: translateX(100%); opacity: 0; pointer-events: none;
            background: linear-gradient(145deg, #1e1e2f 0%, #2a2a40 100%);
        }
        .tab-content.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            display: flex; background: #161625; border-top: 2px solid #ffb347;
            overflow-x: auto;
        }
        .nav-btn {
            flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #aaa; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
            border: none; background: none; gap: 4px; padding: 0 12px;
        }
        .nav-btn.active { color: #ffb347; text-shadow: 0 0 8px #ffb347; }
        .nav-icon { font-size: 24px; }
        button { background: #ffb347; border: none; color: #000; font-weight: bold; padding: 10px 16px; border-radius: 40px; cursor: pointer; font-size: 14px; transition: 0.1s; margin: 4px; }
        button:active { transform: scale(0.96); }
        .clicker-image {
            width: 85%; max-width: 280px; background: #ffb34720; border-radius: 60px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.1s;
            border: 3px solid #ffb347; box-shadow: 0 0 15px #ffb347; margin: 15px auto;
        }
        .clicker-image img { width: 100%; border-radius: 40px; pointer-events: none; }
        .stat { background: #2a2a45; padding: 10px; border-radius: 16px; text-align: center; margin: 5px; }
        .unit-card { background: #2a2a45; border-radius: 16px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .rarity-common { border-left: 5px solid #aaa; }
        .rarity-rare { border-left: 5px solid #4caf50; }
        .rarity-epic { border-left: 5px solid #9c27b0; }
        .rarity-mythic { border-left: 5px solid #ff9800; }
        .rarity-legendary { border-left: 5px solid #f44336; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: #2a2a40; border-radius: 32px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 20px; border: 1px solid #ffb347; text-align: center; }
        .quest-item, .shop-item, .club-item, .admin-item, .streak-item, .skin-item, .record-item, .chat-message { background: #1e1e2f; border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .quest-progress { background: #444; border-radius: 20px; height: 12px; margin: 8px 0; }
        .quest-progress-fill { background: #ffb347; width: 0%; height: 100%; border-radius: 20px; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .avatar-wrapper { display: inline-flex; flex-direction: column; align-items: center; }
        .frame-border { display: inline-block; border-radius: 50%; padding: 4px; background: transparent; }
        .avatar-click { cursor: pointer; background: #ffb34730; border-radius: 50%; width: 48px; height: 48px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .auth-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            visibility: hidden; opacity: 0;
        }
        .auth-overlay.active { visibility: visible; opacity: 1; }
        .auth-card { background: #2a2a40; border-radius: 40px; padding: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #ffb347; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; background: #1e1e2f; border: 1px solid #ffb347; border-radius: 60px; color: white; }
        .error-msg { color: #ff8888; }
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #444; }
        .admin-input { width: 100%; padding: 10px; margin: 8px 0; background: #1e1e2f; border: 1px solid #ffb347; border-radius: 30px; color: white; font-size: 14px; }
        .frame-select { background: #2a2a45; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .club-member { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .friend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #444; }
        .account-switch { background: #2a2a45; border-radius: 20px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .account-select { background: #1e1e2f; color: white; padding: 8px; border-radius: 30px; border: 1px solid #ffb347; }
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000000dd; backdrop-filter: blur(10px); z-index: 5000;
            display: flex; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .loading-card { background: #2a2a40; padding: 30px; border-radius: 48px; width: 80%; max-width: 320px; text-align: center; border: 2px solid #ffb347; }
        .loader-bar { width: 100%; height: 20px; background: #1e1e2f; border-radius: 40px; margin-top: 20px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: #ffb347; transition: width 0.05s linear; }
        .battle-arena { text-align: center; }
        .health-sphere { background: #ffb34720; border-radius: 50%; width: 120px; height: 120px; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 4px solid #ffb347; transition: 0.05s linear; cursor: pointer; }
        .health-sphere:active { transform: scale(0.95); background: #ffb34760; }
        .hit-counter { font-weight: bold; font-size: 24px; }
        .notification { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #ffb347; color: #000; padding: 10px 20px; border-radius: 40px; z-index: 6000; animation: fadeOut 3s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
        .flash { animation: flash 0.1s linear; }
        @keyframes flash { 0% { background: rgba(255,180,71,0.8); } 100% { background: transparent; } }
        .league-badge { font-size: 18px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; background: #2a2a45; padding: 5px 12px; border-radius: 30px; margin: 5px; }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; max-height: 60vh; margin-bottom: 10px; }
        .chat-input-area { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input-area input { flex: 1; background: #1e1e2f; border: 1px solid #ffb347; border-radius: 40px; padding: 12px; color: white; font-size: 14px; }
        .chat-input-area button { white-space: nowrap; }
        .timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 7000;
            visibility: hidden; opacity: 0;
            transition: 0.2s;
            font-size: 80px;
            font-weight: bold;
            color: #ffb347;
        }
        .timer-overlay.active { visibility: visible; opacity: 1; }
        .club-tabs { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .club-tab-btn { background: #2a2a45; color: #fff; border: 1px solid #ffb347; }
        .club-tab-btn.active { background: #ffb347; color: #000; }
        .skin-preview { width: 60px; height: 60px; background: #2a2a45; border-radius: 16px; margin: 5px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #ffb347; }
        .skin-preview.selected { border-color: gold; transform: scale(1.05); }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== КОНСТАНТЫ ====================
    let ADMINS = { "DushkaYaroslav": "16052014" };
    let adminPermissions = {};
    let promoList = JSON.parse(localStorage.getItem('tuntun_promos') || '{}');

    // Расширенные лиги: добавлены Мастер (жёлтая) и Про (зелёная) с уникальными значками
    const LEAGUES = [
        { name: "Бронзовая", star: 1, frame: "Бронзовая рамка", icon: "🥉" },
        { name: "Бронзовая", star: 2, frame: "Бронзовая рамка", icon: "🥉" },
        { name: "Бронзовая", star: 3, frame: "Бронзовая рамка", icon: "🥉" },
        { name: "Серебряная", star: 1, frame: "Серебряная рамка", icon: "🥈" },
        { name: "Серебряная", star: 2, frame: "Серебряная рамка", icon: "🥈" },
        { name: "Серебряная", star: 3, frame: "Серебряная рамка", icon: "🥈" },
        { name: "Золотая", star: 1, frame: "Золотая рамка", icon: "🥇" },
        { name: "Золотая", star: 2, frame: "Золотая рамка", icon: "🥇" },
        { name: "Золотая", star: 3, frame: "Золотая рамка", icon: "🥇" },
        { name: "Платиновая", star: 1, frame: "Платиновая рамка", icon: "💎" },
        { name: "Платиновая", star: 2, frame: "Платиновая рамка", icon: "💎" },
        { name: "Платиновая", star: 3, frame: "Платиновая рамка", icon: "💎" },
        { name: "Алмазная", star: 1, frame: "Алмазная рамка", icon: "💠" },
        { name: "Алмазная", star: 2, frame: "Алмазная рамка", icon: "💠" },
        { name: "Алмазная", star: 3, frame: "Алмазная рамка", icon: "💠" },
        { name: "Мастер", star: 1, frame: "Мастерская рамка", icon: "⭐" },
        { name: "Мастер", star: 2, frame: "Мастерская рамка", icon: "⭐" },
        { name: "Мастер", star: 3, frame: "Мастерская рамка", icon: "⭐" },
        { name: "Про", star: 1, frame: "Про-рамка", icon: "🌟" },
        { name: "Про", star: 2, frame: "Про-рамка", icon: "🌟" },
        { name: "Про", star: 3, frame: "Про-рамка", icon: "🌟" }
    ];
    const ALL_FRAMES = ["Стандартная", "Бронзовая рамка", "Серебряная рамка", "Золотая рамка", "Алмазная рамка", "🔥Пламенная рамка🔥", "❄️Ледяная рамка❄️", "🌙Лунная рамка🌙", "⚡Грозовая рамка⚡", "Платиновая рамка", "Мастерская рамка", "Про-рамка", "🌺Мамин цветок🌺"];
    const SKINS = [
        { id: "frame_fire", name: "Пламенная рамка", type: "frame", priceDiamonds: 200 },
        { id: "frame_ice", name: "Ледяная рамка", type: "frame", priceDiamonds: 200 },
        { id: "frame_moon", name: "Лунная рамка", type: "frame", priceDiamonds: 250 },
        { id: "frame_thunder", name: "Грозовая рамка", type: "frame", priceDiamonds: 300 },
        { id: "click_fire", name: "Огненный клик", type: "clickEffect", priceDiamonds: 150, effect: "🔥" },
        { id: "click_star", name: "Звёздный клик", type: "clickEffect", priceDiamonds: 150, effect: "⭐" },
        { id: "avatar_dragon", name: "Аватар Дракона", type: "avatar", priceDiamonds: 300, avatarUrl: "🐉" }
    ];
    
    let gameState = null, currentUsername = null, saveInterval = null;
    let deviceToken = localStorage.getItem('device_token') || ('dev_'+Math.random().toString(36).substr(2,16));
    localStorage.setItem('device_token', deviceToken);
    let sessionStartTime = Date.now();
    let battleActive = false;
    let battleStartTime = 0;
    let chatMessages = [];
    let adminPanelCreated = false; 
    let momEventActive = false;
    let momQuestCompleted = false;

    // ========== СОБЫТИЕ ДЕНЬ РОЖДЕНИЯ МАМЫ (9 июня) ==========
    function isMomBirthday() {
        const today = new Date();
        return today.getMonth() === 5 && today.getDate() === 9;
    }

    // Проверка, получал ли игрок награду за маму в этом году (навсегда для аккаунта)
    function hasMomRewardClaimed() {
        if(!currentUsername) return false;
        let claimed = localStorage.getItem(`mom_reward_${currentUsername}`);
        return claimed === 'true';
    }
    function setMomRewardClaimed() {
        if(!currentUsername) return;
        localStorage.setItem(`mom_reward_${currentUsername}`, 'true');
    }

    function applyMomBonus() {
        if(!gameState) return;
        if(momEventActive && !momQuestCompleted) {
            if(gameState._originalClickIncome === undefined) {
                gameState._originalClickIncome = gameState.clickIncome;
            }
            gameState.clickIncome = gameState._originalClickIncome * 2;
        } else {
            if(gameState._originalClickIncome !== undefined) {
                gameState.clickIncome = gameState._originalClickIncome;
            }
        }
        persistGame();
    }

    function showMomCard() {
        if(hasMomRewardClaimed()) {
            showMessage("🌺 Вы уже получили подарок за маму в этом году! 🌺");
            return;
        }
        let modal = document.getElementById('momCardModal');
        if(!modal) {
            let div = document.createElement('div');
            div.id = 'momCardModal';
            div.className = 'modal';
            div.innerHTML = `
                <div class="modal-content" style="text-align:center;">
                    <h2>🌺 С ДНЁМ РОЖДЕНИЯ, МАМА! 🌺</h2>
                    <p style="font-size:18px; margin:15px 0;">Дорогая мамочка!<br>Спасибо за твою любовь и заботу.<br>Ты самый дорогой человек в мире!<br>Желаю тебе здоровья, счастья и цветов!</p>
                    <div style="font-size:40px;">🎂🌹🎉🌸</div>
                    <button id="claimMomRewardBtn">Получить подарок 🌸</button>
                    <button id="closeMomCardBtn">Закрыть</button>
                </div>
            `;
            document.body.appendChild(div);
            modal = div;
            document.getElementById('claimMomRewardBtn').onclick = () => {
                if(!hasMomRewardClaimed()) {
                    gameState.money += 5000;
                    gameState.diamonds += 50;
                    gameState.power += 100;
                    addFrame("🌺Мамин цветок🌺");
                    showMessage("🎁 Вы получили: 5000💰, 50💎, +100⚡ и рамку '🌺Мамин цветок🌺'!");
                    let momQuest = gameState.quests.tasks.find(t => t.type === 'mom_birthday');
                    if(momQuest && !momQuest.claimed) {
                        momQuest.progress = 1;
                        momQuest.claimed = true;
                        persistGame();
                    }
                    momQuestCompleted = true;
                    setMomRewardClaimed();
                    updateMomBonus(); 
                    updateUI();
                } else {
                    showMessage("Вы уже получали подарок в этом году! 🌸");
                }
                modal.classList.remove('active');
            };
            document.getElementById('closeMomCardBtn').onclick = () => modal.classList.remove('active');
        }
        modal.classList.add('active');
    }

    function activateMomEvent() {
        if(!isMomBirthday()) return;
        momEventActive = true;
        document.body.classList.add('mom-birthday');
        setInterval(() => {
            if(momEventActive && !momQuestCompleted) {
                let flower = document.createElement('div');
                flower.className = 'flower-decoration';
                flower.innerHTML = ['🌸','🌼','🌻','🌺','🌸','🌷'][Math.floor(Math.random()*6)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.fontSize = (20 + Math.random() * 30) + 'px';
                flower.style.animationDuration = (5 + Math.random() * 10) + 's';
                document.body.appendChild(flower);
                setTimeout(() => flower.remove(), 15000);
            }
        }, 3000);
        if(!gameState.quests.tasks.find(t => t.type === 'mom_birthday')) {
            gameState.quests.tasks.push({
                type: 'mom_birthday',
                need: 1,
                progress: 0,
                claimed: false,
                rewardMoney: 5000,
                rewardDiamonds: 50,
                rewardPower: 100,
                rewardFrame: "🌺Мамин цветок🌺",
                description: "Поздравить маму с днём рождения (открыть открытку)"
            });
            persistGame();
        }
        if(!hasMomRewardClaimed()) {
            setTimeout(() => showMomCard(), 1000);
        }
        updateMomBonus();
    }

    // ========== ЛИГИ С ЗНАЧКАМИ ==========
    function updateLeague() {
        let wins = gameState.wins;
        let leagueIndex = Math.min(Math.floor(wins / 10), LEAGUES.length - 1);
        if(leagueIndex < 0) leagueIndex = 0;
        let league = LEAGUES[leagueIndex];
        gameState.leagueName = league.name;
        gameState.leagueStar = league.star;
        gameState.leagueIcon = league.icon;
        if(!gameState.ownedFrames.includes(league.frame)) { addFrame(league.frame); }
        let leagueDiv = document.getElementById('leagueDisplay');
        if(leagueDiv) { 
            let stars = '⭐'.repeat(league.star) + '☆'.repeat(3 - league.star);
            leagueDiv.innerHTML = `${league.icon} Лига: ${league.name} ${stars}`;
        }
    }
    function addWinForLeague() { updateLeague(); }

    // ========== ОСТАЛЬНЫЕ ФУНКЦИИ (сокращённо, но полноценно) ==========
    function loadChat() { let saved = localStorage.getItem('tuntun_chat'); if(saved) chatMessages = JSON.parse(saved); else chatMessages = []; }
    function saveChat() { if(chatMessages.length > 200) chatMessages = chatMessages.slice(-200); localStorage.setItem('tuntun_chat', JSON.stringify(chatMessages)); }
    function sendChatMessage(text) { if(!currentUsername) return; if(!text.trim()) return; let msg = { username: currentUsername, text: text.trim(), time: Date.now() }; chatMessages.push(msg); saveChat(); renderChat(); }
    function renderChat() { let container = document.getElementById('chatMessagesList'); if(!container) return; container.innerHTML = chatMessages.slice().reverse().map(m => `<div class="chat-message"><b>${escapeHtml(m.username)}:</b> ${escapeHtml(m.text)}</div>`).join(''); container.scrollTop = container.scrollHeight; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

    function loadAdmins() { let saved = localStorage.getItem('tuntun_admins'); if(saved) ADMINS = JSON.parse(saved); else localStorage.setItem('tuntun_admins', JSON.stringify(ADMINS)); }
    function saveAdmins() { localStorage.setItem('tuntun_admins', JSON.stringify(ADMINS)); }
    function addAdmin(username, password) { if(ADMINS[username]) return false; ADMINS[username] = password; saveAdmins(); return true; }
    function removeAdmin(username) { if(username === "DushkaYaroslav") return false; delete ADMINS[username]; saveAdmins(); return true; }
    function isAdmin(username) { return ADMINS.hasOwnProperty(username); }
    loadAdmins();

    function savePromos() { localStorage.setItem('tuntun_promos', JSON.stringify(promoList)); }
    function addPromo(code, reward) { if(promoList[code]) return false; promoList[code] = reward; savePromos(); return true; }
    function removePromo(code) { delete promoList[code]; savePromos(); }
    function applyPromoCode(code) {
        code = code.trim();
        if(gameState.usedPromoCodes.includes(code)) return "Уже использован";
        let reward = promoList[code];
        if(!reward) return "Неверный код";
        if(reward.money) gameState.money += reward.money;
        if(reward.diamonds) gameState.diamonds += reward.diamonds;
        if(reward.power) gameState.power += reward.power;
        if(reward.frame) addFrame(reward.frame);
        gameState.usedPromoCodes.push(code);
        persistGame();
        return `+${reward.money||0}💰 +${reward.diamonds||0}💎 +${reward.power||0}⚡ ${reward.frame?' +рамка':''}`;
    }

    function getUsersDB() { return JSON.parse(localStorage.getItem('tuntun_users')||'{}'); }
    function saveUsersDB(users) { localStorage.setItem('tuntun_users', JSON.stringify(users)); }
    function saveGameToStorage(username, state) { localStorage.setItem(`tuntun_game_${username}`, JSON.stringify(state)); }
    function loadGameFromStorage(username) { return JSON.parse(localStorage.getItem(`tuntun_game_${username}`)||'null'); }
    function addTrustedDevice(username, token) { let u=getUsersDB(); if(u[username]){ if(!u[username].trustedDevices) u[username].trustedDevices=[]; if(!u[username].trustedDevices.includes(token)) u[username].trustedDevices.push(token); saveUsersDB(u); } }
    function isDeviceTrusted(username, token) { let u=getUsersDB(); return u[username]?.trustedDevices?.includes(token)||false; }
    function isBanned(username) { let u=getUsersDB(); return u[username]?.banned === true; }

    function renderClubUI() { let infoDiv = document.getElementById('clubInfo'); let actionsDiv = document.getElementById('clubActions'); let leaderDiv = document.getElementById('clubLeaderboard'); if(!infoDiv) return; if(!gameState.club) { infoDiv.innerHTML = `<p>Вы не в клубе.</p><input id="newClubName" class="admin-input" placeholder="Название клуба (макс 20)" maxlength="20"><button id="createClubBtn">Создать (1м монет)</button><br><input id="joinClubName" class="admin-input" placeholder="Название для вступления"><button id="joinClubBtn">Вступить</button>`; document.getElementById('createClubBtn')?.addEventListener('click',()=>{ let name = document.getElementById('newClubName').value.trim(); if(name && gameState.money >= 1000000 && createClub(name, currentUsername)) { gameState.money -= 1000000; gameState.club = { name: name, role: 'leader' }; persistGame(); updateUI(); renderClubUI(); showMessage(`Клуб "${name}" создан!`); } else showMessage("Ошибка"); }); document.getElementById('joinClubBtn')?.addEventListener('click',()=>{ let name = document.getElementById('joinClubName').value.trim(); if(name && joinClub(name, currentUsername)) { gameState.club = { name: name, role: 'member' }; persistGame(); updateUI(); renderClubUI(); showMessage(`Вы вступили в ${name}`); } else showMessage("Ошибка"); }); } else { let clubs = getClubsDB(); let clubData = clubs[gameState.club.name]; let membersHtml = ''; if(clubData && clubData.members) { let membersWithWins = clubData.members.map(m => { let st = loadGameFromStorage(m); return { name: m, wins: st ? st.wins : 0 }; }).sort((a,b)=>b.wins - a.wins); membersHtml = membersWithWins.map(m => `<div class="club-member">${getAvatarHtml(loadGameFromStorage(m.name)?.avatarBase64)}<span>${m.name}${m.name === clubData.leader ? ' (лидер)' : ''}</span><span style="margin-left:auto;">🏆 ${m.wins}</span></div>`).join(''); } infoDiv.innerHTML = `<h3>🏠 Клуб: ${gameState.club.name}</h3><p>🏆 Побед клуба: ${clubData?.wins||0} 🏆</p>`; actionsDiv.innerHTML = `<div class="club-tabs"><button class="club-tab-btn active" data-tab="members">Состав</button><button class="club-tab-btn" data-tab="top">Топ побед</button><button class="club-tab-btn" data-tab="global">Топ клубов</button></div><div id="clubTabContent">${membersHtml}</div>`; if(gameState.club.role === 'leader') { actionsDiv.innerHTML += `<button id="inviteFriendBtn">Пригласить друга (ссылка)</button><div id="inviteLink"></div>`; document.getElementById('inviteFriendBtn')?.addEventListener('click',()=>{ let link = `${window.location.origin}${window.location.pathname}?invite=${gameState.club.name}`; document.getElementById('inviteLink').innerHTML = `<input value="${link}" readonly><button id="copyInvite">Копировать</button>`; document.getElementById('copyInvite')?.addEventListener('click',()=>{ navigator.clipboard.writeText(link); showMessage("Ссылка скопирована"); }); }); } document.querySelectorAll('.club-tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.club-tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); let tab = btn.dataset.tab; let contentDiv = document.getElementById('clubTabContent'); if(tab === 'members') { let members = clubData.members.map(m => { let st = loadGameFromStorage(m); return `<div class="club-member">${getAvatarHtml(st?.avatarBase64)}<span>${m}${m === clubData.leader ? ' (лидер)' : ''}</span><span style="margin-left:auto;">🏆 ${st?st.wins:0}</span></div>`; }).join(''); contentDiv.innerHTML = members; } else if(tab === 'top') { let members = clubData.members.map(m => { let st = loadGameFromStorage(m); return { name: m, wins: st ? st.wins : 0 }; }).sort((a,b)=>b.wins - a.wins); let html = members.map(m => `<div class="club-member"><span>${m.name}</span><span style="margin-left:auto;">🏆 ${m.wins}</span></div>`).join(''); contentDiv.innerHTML = html; } else if(tab === 'global') { let topClubs = Object.values(getClubsDB()).sort((a,b)=>b.wins - a.wins); let html = topClubs.map(c => `<div class="leaderboard-item"><span>${c.name}</span><span>🏆 ${c.wins}</span></div>`).join(''); contentDiv.innerHTML = html; } }); }); } let leaderDivElem = document.getElementById('clubLeaderboard'); if(leaderDivElem) { let topClubs = Object.values(getClubsDB()).sort((a,b)=>b.wins - a.wins); leaderDivElem.innerHTML = `<h4>🏅 Рейтинг клубов</h4>` + topClubs.map(c=>`<div class="leaderboard-item"><span>${c.name}</span><span>🏆${c.wins}</span></div>`).join(''); } }

    function getUnitCost(unit,lvl){ if(lvl>=6) return Infinity; return unit.baseCost * Math.pow(2,lvl); }
    function buyUnit(unit){ let owned=gameState.units.find(u=>u.id===unit.id); let level=owned?owned.level:0; if(level>=6){alert("Макс"); return;} let cost=getUnitCost(unit,level); if(gameState.money<cost) return; gameState.money-=cost; if(!owned) gameState.units.push({id:unit.id,rarity:unit.rarity,level:1,income:unit.baseIncome*2}); else {owned.level++; owned.income=unit.baseIncome*Math.pow(2,owned.level);} recalcPowerAndIncome(); updateUI(); persistGame();}

    function openSkinShop() { let modal = document.getElementById('skinShopModal'); if(!modal) return; let container = document.getElementById('skinShopList'); container.innerHTML = SKINS.map(s=>`<div><b>${s.name}</b> - ${s.priceDiamonds}💎<button class="buySkinBtn" data-id="${s.id}">Купить</button></div>`).join(''); let clickerSkinDiv = document.createElement('div'); clickerSkinDiv.innerHTML = '<h3>Скины кликера:</h3><div id="clickerSkinGrid" style="display:flex; flex-wrap:wrap;"></div><div><input type="file" id="customSkinUpload" accept="image/*"><button id="uploadCustomSkinBtn">Загрузить свою картинку</button></div>'; container.appendChild(clickerSkinDiv); let grid = document.getElementById('clickerSkinGrid'); clickerSkins.forEach(skin => { let btn = document.createElement('div'); btn.className = 'skin-preview'; if(gameState.clickerSkin === skin.id) btn.classList.add('selected'); btn.innerHTML = skin.id === 'default' ? '🐊' : (skin.custom ? '🖼️' : '🎨'); btn.title = skin.name; btn.onclick = () => applyClickerSkin(skin.id); grid.appendChild(btn); }); document.getElementById('uploadCustomSkinBtn').onclick = () => { let fileInput = document.getElementById('customSkinUpload'); let file = fileInput.files[0]; if(file) { let reader = new FileReader(); reader.onload = (e) => uploadCustomSkin(e.target.result); reader.readAsDataURL(file); } else alert("Выберите картинку"); }; modal.classList.add('active'); document.querySelectorAll('.buySkinBtn').forEach(btn=>btn.addEventListener('click',()=>{ let skin=SKINS.find(s=>s.id===btn.dataset.id); if(gameState.diamonds>=skin.priceDiamonds && !gameState.ownedSkins.includes(skin.id)){ gameState.diamonds-=skin.priceDiamonds; gameState.ownedSkins.push(skin.id); if(skin.type==='frame') addFrame(skin.name); if(skin.type==='clickEffect') gameState.selectedClickEffect=skin.effect; if(skin.type==='avatar') gameState.selectedAvatar=skin.avatarUrl; persistGame(); updateUI(); showMessage(`Скин ${skin.name} куплен!`); openSkinShop(); } else showMessage("Ошибка"); })); document.getElementById('closeSkinShop').onclick=()=>modal.classList.remove('active'); }
    function recalcPowerAndIncome(){ let totalInc=0; gameState.units.forEach(u=>totalInc+=u.income); gameState.incomePerMinute = totalInc; let basePower = 1+Math.floor(totalInc/10); if(Date.now() < gameState.upgrades.powerBuffEnd) basePower*=2; gameState.power = basePower; let p = gameState.power; gameState.arenaLevel = p<1000?1: p<10000?2: p<50000?3: p<250000?4: p<1000000?5:6; let skin = arenaSkins[gameState.arenaLevel-1]; let clickerSkin = clickerSkins.find(s => s.id === gameState.clickerSkin) || clickerSkins[0]; let content = clickerSkin.content; if(gameState.clickerSkin && gameState.clickerSkin.startsWith('custom_') && gameState.customSkin) { content = `<img src="${gameState.customSkin}" style="width:100%; border-radius:40px;">`; } document.getElementById('clickerImage').innerHTML = content; document.getElementById('arena-badge').innerHTML = `Арена ${gameState.arenaLevel}`; }
    function renderShop(){let cont=document.getElementById('shop-container'); if(!cont) return; let upgrades=gameState.upgrades; let clickCost=10*Math.pow(2,upgrades.clickLevel-1); cont.innerHTML=`<div><div>💪 +1 к клику (+${gameState.clickIncome})</div><div>${clickCost}💎</div><button class="buy-shop" data-shop="click">Улучшить</button></div><div><div>❤️ Здоровье x2 на час</div><div>50💎</div><button class="buy-shop" data-shop="health">Купить</button></div><div><div>⚡ Мощь x2 на час</div><div>100💎</div><button class="buy-shop" data-shop="power">Купить</button></div><div><div>📈 Лимит кликов x2</div><div>150💎</div><button class="buy-shop" data-shop="limit">Увеличить</button></div>`; document.querySelectorAll('.buy-shop').forEach(btn=>btn.addEventListener('click',()=>{ let type=btn.dataset.shop; if(type==='click'){ let cost=10*Math.pow(2,upgrades.clickLevel-1); if(gameState.diamonds>=cost){gameState.diamonds-=cost; upgrades.clickLevel++; gameState.clickIncome=upgrades.clickLevel; updateUI(); persistGame(); renderShop();} else alert("Нет алмазов");} else if(type==='health'&&gameState.diamonds>=50){gameState.diamonds-=50; upgrades.healthBuffEnd=Date.now()+3600000; updateUI(); persistGame(); alert("Здоровье x2");} else if(type==='power'&&gameState.diamonds>=100){gameState.diamonds-=100; upgrades.powerBuffEnd=Date.now()+3600000; recalcPowerAndIncome(); updateUI(); persistGame(); alert("Мощь x2");} else if(type==='limit'&&gameState.diamonds>=150){gameState.diamonds-=150; gameState.dailyClickLimit*=2; updateUI(); persistGame(); alert("Лимит увеличен");} else alert("Не хватает");}));}
    function resetDailyQuestsIfNeeded(){let today=new Date().toDateString(); if(!gameState.quests.lastDateStr) gameState.quests.lastDateStr=today; if(gameState.quests.lastDateStr!==today){gameState.quests.tasks.forEach(t=>{t.progress=0; t.claimed=false;}); gameState.quests.lastDateStr=today; persistGame();}}
    function updateQuestProgress(type,delta=1){resetDailyQuestsIfNeeded(); gameState.quests.tasks.forEach(task=>{if(!task.claimed && task.type===type) task.progress=Math.min(task.need,task.progress+delta);}); renderQuestsModal();}

            <div class="tab-content" id="tab-shop"><h2>💎 Магазин</h2><div id="shop-container"></div><button id="skinShopBtn">🎨 Магазин скинов</button></div>
            <div class="tab-content" id="tab-clubs"><h2>🏆 Клубы</h2><div id="clubInfo"></div><div id="clubActions"></div><div id="clubLeaderboard"></div></div>
            <div class="tab-content" id="tab-chat"><h2>💬 ОБЩИЙ ЧАТ</h2><div class="chat-container"><div id="chatMessagesList" class="chat-messages"></div><div class="chat-input-area"><input type="text" id="chatInput" placeholder="Введите сообщение..."><button id="chatSendBtn">Отправить</button></div></div></div>
            <div class="tab-content" id="tab-admin"><h2>🔧 Админ-панель</h2><div id="adminPanel"></div></div>
            <div class="tab-content" id="tab-profile"><h2>👤 Профиль</h2><div id="accountSwitcher"></div><div style="display:flex;align-items:center;gap:15px;"><div class="avatar-wrapper"><div id="avatarFrameWrapper" class="frame-border"><div class="avatar-click" id="avatarPreview">👤</div></div></div><div><strong id="profile-name"></strong><div id="frameDisplay"></div></div><button id="uploadAvatarBtn">📸 Загрузить аватар</button><input type="file" id="avatarInput" style="display:none"></div><div id="profile-info"></div><div class="frame-select"><select id="frameSelect"></select></div><button id="logoutButton">🚪 Выйти</button><button id="achievementsBtn">🏅 Достижения</button></div>
            <div class="bottom-nav" id="bottomNav"><button class="nav-btn active" data-tab="tab-clicker"><span class="nav-icon">🦎</span>Клик</button><button class="nav-btn" data-tab="tab-units"><span class="nav-icon">🗡️</span>Юниты</button><button class="nav-btn" data-tab="tab-battle"><span class="nav-icon">⚔️</span>Бой</button><button class="nav-btn" data-tab="tab-friends"><span class="nav-icon">👥</span>Друзья</button><button class="nav-btn" data-tab="tab-shop"><span class="nav-icon">💎</span>Магазин</button><button class="nav-btn" data-tab="tab-clubs"><span class="nav-icon">🏆</span>Клубы</button><button class="nav-btn" data-tab="tab-chat"><span class="nav-icon">💬</span>Чат</button><button class="nav-btn" data-tab="tab-profile"><span class="nav-icon">👤</span>Профиль</button></div>
        </div>
        <div id="battleModal" class="modal"><div class="modal-content battle-arena"><h2>⚔️ БОЙ</h2><div id="playerSphere" class="health-sphere">🐉<br><span class="hit-counter" id="playerHits">0</span>/50</div><div id="botSphere" class="health-sphere">🤖<br><span class="hit-counter" id="botHits">0</span>/50</div><button id="battleHitBtn">💥 УДАР!</button><button id="closeBattleModal">Закрыть</button></div></div>
        <div id="skinShopModal" class="modal"><div class="modal-content"><h2>🎨 МАГАЗИН СКИНОВ</h2><div id="skinShopList"></div><button id="closeSkinShop">Закрыть</button></div></div>
        <div id="achievementsModal" class="modal"><div class="modal-content"><h3>🏅 ДОСТИЖЕНИЯ</h3><div id="achievementsList"></div><button id="closeAchievements">Закрыть</button></div></div>
        <div id="leaderboardModal" class="modal"><div class="modal-content"><h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3><div id="leaderboardList"></div><button id="closeLeaderboard">Закрыть</button></div></div>
        <div id="questsModal" class="modal"><div class="modal-content"><h3>📋 КВЕСТЫ</h3><div id="questsList"></div><button id="closeQuests">Закрыть</button></div></div>
        <div id="promoModal" class="modal"><div class="modal-content"><h3>🎁 ПРОМО-КОДЫ</h3><input id="promoCode" placeholder="Промокод"><button id="applyPromo">Активировать</button><div id="promoMessage"></div><hr><button id="applyTaxBtn">Налог 25%</button><button id="closePromoModal">Закрыть</button></div></div>
        <div id="streakModal" class="modal"><div class="modal-content"><h3>📅 ЕЖЕДНЕВНАЯ СЕРИЯ</h3><div id="streakInfo"></div><button id="claimStreakBtn">Забрать</button><button id="closeStreak">Закрыть</button></div></div>`;
        document.getElementById('clickerImage').addEventListener('click', clickHandler);
        document.getElementById('fight-btn').addEventListener('click', startBattle);
        document.getElementById('skinShopBtn').addEventListener('click', openSkinShop);
        document.getElementById('copy-link-btn').addEventListener('click',()=>navigator.clipboard.writeText(document.getElementById('friend-link').innerText));
        document.getElementById('logoutButton').addEventListener('click',()=>{ if(saveInterval)clearInterval(saveInterval); currentUsername=null; gameState=null; showAuthModal(); });
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(btn.dataset.tab).classList.add('active'); }));
        document.body.addEventListener('click', (e) => { if(e.target.classList && (e.target.classList.contains('close-btn') || e.target.id?.startsWith('close'))) { const modal = e.target.closest('.modal'); if(modal) modal.classList.remove('active'); } });
        const closeBtns = ['closeBattleModal','closeSkinShop','closeAchievements','closeLeaderboard','closeQuests','closeStreak','closePromoModal'];
        closeBtns.forEach(id => document.getElementById(id)?.addEventListener('click',()=>{ let modalId = id.replace('close','')+'Modal'; let modal = document.getElementById(modalId); if(modal) modal.classList.remove('active'); }));
        document.getElementById('achievementsBtn')?.addEventListener('click',()=>{ document.getElementById('achievementsList').innerHTML = "Достижения временно отключены"; document.getElementById('achievementsModal').classList.add('active'); });
        document.getElementById('streakIcon')?.addEventListener('click',()=>{ renderStreakModal(); document.getElementById('streakModal').classList.add('active'); });
        document.getElementById('questsIcon')?.addEventListener('click',()=>{ renderQuestsModal(); document.getElementById('questsModal').classList.add('active'); });
        document.getElementById('leaderboardIcon')?.addEventListener('click',()=>{ updateLeaderboardAndFriends(); document.getElementById('leaderboardModal').classList.add('active'); });
        document.getElementById('promoIcon')?.addEventListener('click',()=>{ let tax=applyWeeklyTax(); if(tax) document.getElementById('promoMessage').innerHTML=`Налог: -${tax.taxMoney}💰 -${tax.taxDiamonds}💎`; else document.getElementById('promoMessage').innerHTML='Налог не требуется'; document.getElementById('promoModal').classList.add('active'); });
        document.getElementById('applyPromo')?.addEventListener('click',()=>{ let code=document.getElementById('promoCode').value; let msg=applyPromoCode(code); document.getElementById('promoMessage').innerHTML=msg; if(msg.includes("+")) updateUI(); });
        document.getElementById('applyTaxBtn')?.addEventListener('click',()=>{ let tax=applyWeeklyTax(); if(tax){ document.getElementById('promoMessage').innerHTML=`Налог: -${tax.taxMoney}💰 -${tax.taxDiamonds}💎`; updateUI(); } else document.getElementById('promoMessage').innerHTML="Налог уже был"; });
        document.getElementById('claimStreakBtn')?.addEventListener('click',()=>{ let res=checkAndClaimDailyStreak(); if(res.canClaim) alert(`+${res.rewardMoney}💰 +${res.rewardDiamonds}💎 Серия ${res.streak}`); else alert(res.message); renderStreakModal(); updateUI(); document.getElementById('streakModal').classList.remove('active'); });
        document.getElementById('skinsIcon')?.addEventListener('click', openSkinShop);
        document.getElementById('loginBtn').addEventListener('click',()=>{ let u=document.getElementById('loginUsername').value.trim(); let p=document.getElementById('loginPassword').value; let res=loginUser(u,p); if(res){ addSavedAccount(u); switchToAccount(u); hideAuthModal(); } else document.getElementById('authMessage').innerText="Ошибка"; });
        document.getElementById('registerBtn').addEventListener('click',()=>{ let u=document.getElementById('loginUsername').value.trim(); let p=document.getElementById('loginPassword').value; if(registerUser(u,p)){ let res=loginUser(u,p); if(res){ addSavedAccount(u); switchToAccount(u); hideAuthModal(); } } else document.getElementById('authMessage').innerText="Регистрация не удалась"; });
        document.getElementById('closeAuthBtn').addEventListener('click', hideAuthModal);
        document.getElementById('chatSendBtn').addEventListener('click', () => { let input = document.getElementById('chatInput'); if(input) { sendChatMessage(input.value); input.value = ''; } });
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { let input = e.target; sendChatMessage(input.value); input.value = ''; } });
        setupAvatarUpload(); renderAccountSwitcher(); loadChat(); renderChat();
        let last = getLastAccount();
        if(last && loadGameFromStorage(last)) switchToAccount(last);
        else if(getSavedAccounts().length > 0) switchToAccount(getSavedAccounts()[0]);
        else showAuthModal();
        setInterval(()=>{ if(gameState && currentUsername){ let delta=Math.floor((Date.now()-sessionStartTime)/1000); gameState.totalPlayTime+=delta; sessionStartTime=Date.now(); persistGame(); updateUI(); } }, 60000);
        setInterval(()=>{ if(gameState && currentUsername){ let inc=gameState.incomePerMinute/60; if(inc>0){ gameState.money+=inc; updateUI(); persistGame(); } } }, 1000);
        if(isMomBirthday() && !momEventActive) { setTimeout(() => activateMomEvent(), 500); } else if(isMomBirthday()) { setTimeout(() => showMomCard(), 500); }
        showMessage("✨ Добавлены лиги Мастер (жёлтая) и Про (зелёная) со значками! Награда за маму — один раз на аккаунт.");
        setTimeout(()=>document.getElementById('globalLoading').classList.remove('active'), 800);
    }
    buildApp();
</script>
</body>
</html>
