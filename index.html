        if (!state || state.claimed) return;
        let newProgress = Math.min(ach.target, currentValue);
        if (newProgress > state.progress) {
            state.progress = newProgress;
            persistGame();
            if (state.progress >= ach.target) {
                showMessage(`🏆 Достижение "${ach.name}" выполнено! Заберите награду во вкладке "Достижения"`);
            }
            renderAchievements();
        }
    }

    function claimAchievement(achId) {
        let ach = ACHIEVEMENTS.find(a => a.id === achId);
        if (!ach) return;
        let state = gameState.achievements[achId];
        if (!state || state.claimed) return;
        if (state.progress >= ach.target) {
            state.claimed = true;
            if (ach.reward.money) gameState.money += ach.reward.money;
            if (ach.reward.diamonds) gameState.diamonds += ach.reward.diamonds;
            if (ach.reward.frame) addFrame(ach.reward.frame);
            persistGame();
            updateUI();
            renderAchievements();
            showMessage(`🎉 Награда за достижение "${ach.name}" получена!`);
        } else {
            showMessage(`Достижение "${ach.name}" ещё не выполнено (${state.progress}/${ach.target})`);
        }
    }

    function getLeagueIndex(wins) { return Math.min(Math.floor(wins / 10), LEAGUES.length - 1); }
    function getMinWinsForLeagueIndex(index) { if(index <= 0) return 0; return index * 10; }
    function applyWeeklyLeagueReset() {
        if(!gameState) return;
        const now = Date.now();
        const weekMs = 7 * 24 * 3600 * 1000;
        if(!gameState.lastLeagueReset) gameState.lastLeagueReset = now;
        if(now - gameState.lastLeagueReset >= weekMs) {
            let currentIndex = getLeagueIndex(gameState.wins);
            let newIndex = Math.max(0, currentIndex - 3);
            let newWins = getMinWinsForLeagueIndex(newIndex);
            if(newWins !== gameState.wins) {
                gameState.wins = newWins;
                showMessage(`⚠️ Еженедельный сброс лиги! Ваша лига понижена на 3 ступени. Новая лига: ${LEAGUES[newIndex].name} ${LEAGUES[newIndex].star}⭐`);
                persistGame();
                updateLeague();
                updateUI();
            }
            gameState.lastLeagueReset = now;
            persistGame();
        }
    }

    function getUnitCost(unit,lvl){ if(lvl>=6) return Infinity; return unit.baseCost * Math.pow(2,lvl); }
    function buyUnit(unit){ let owned=gameState.units.find(u=>u.id===unit.id); let level=owned?owned.level:0; if(level>=6){alert("Макс"); return;} let cost=getUnitCost(unit,level); if(gameState.money<cost) return; gameState.money-=cost; if(!owned) gameState.units.push({id:unit.id,rarity:unit.rarity,level:1,income:unit.baseIncome*2}); else {owned.level++; owned.income=unit.baseIncome*Math.pow(2,owned.level);} recalcPowerAndIncome(); updateUI(); persistGame(); updateAchievementUnitsBought(); }
    function recalcPowerAndIncome(){ let totalInc=0; gameState.units.forEach(u=>totalInc+=u.income); gameState.incomePerMinute = totalInc; let basePower = 1+Math.floor(totalInc/10); if(Date.now() < gameState.upgrades.powerBuffEnd) basePower*=2; gameState.power = basePower; let p = gameState.power; gameState.arenaLevel = p<1000?1: p<10000?2: p<50000?3: p<250000?4: p<1000000?5:6; let clickerSkin = clickerSkins.find(s => s.id === gameState.clickerSkin) || clickerSkins[0]; let content = clickerSkin.content; if(gameState.clickerSkin && gameState.clickerSkin.startsWith('custom_') && gameState.customSkin) content = `<img src="${gameState.customSkin}" style="width:100%; border-radius:40px;">`; let ci = document.getElementById('clickerImage'); if(ci) ci.innerHTML = content; let ab = document.getElementById('arena-badge'); if(ab) ab.innerHTML = `Арена ${gameState.arenaLevel}`; updateAchievementIncome(); }
    function clickHandler(){ if(gameState.moneyEarnedToday >= gameState.dailyClickLimit){alert("Лимит"); return;} let gain = gameState.clickIncome; gameState.money += gain; gameState.moneyEarnedToday += gain; gameState.totalClicks++; updateQuestProgress('clicks',1); flashElement(document.getElementById('clickerImage')); updateUI(); persistGame(); updateAchievementClicks(); }
    function flashElement(el){ if(!el) return; el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),100); }

    // ---------- БОИ ----------
    function getBattleCost() { if(gameState.incomePerMinute <= 0) return 100; return gameState.incomePerMinute * 10; }
    let pendingBattle = false;
    function startBattleWithTimer() { if(battleActive) return; let cost = getBattleCost(); if(gameState.money < cost) { alert(`Не хватает монет! Нужно ${Math.floor(cost)}💰`); return; } pendingBattle = true; let timerOverlay = document.getElementById('timerOverlay'); let timerSpan = document.getElementById('timerValue'); let count = 3; timerSpan.innerText = count; timerOverlay.classList.add('active'); let interval = setInterval(() => { count--; timerSpan.innerText = count; if(count <= 0) { clearInterval(interval); timerOverlay.classList.remove('active'); if(pendingBattle) { pendingBattle = false; gameState.money -= cost; persistGame(); updateUI(); openBattleArena(); } } }, 1000); }
    function openBattleArena() { let modal = document.getElementById('battleModal'); modal.classList.add('active'); let maxHits=50, playerHits=0, botHits=0, battleOver=false; let botSpeed = 5; battleStartTime = Date.now(); let interval = setInterval(()=>{ if(!battleOver){ botHits++; document.getElementById('botHits').innerText=botHits; if(botHits>=maxHits) finish(false); } }, 1000/botSpeed); let hitHandler = () => { if(battleOver) return; playerHits++; document.getElementById('playerHits').innerText=playerHits; if(playerHits>=maxHits) finish(true); flashElement(document.getElementById('playerSphere')); }; document.getElementById('battleHitBtn').onclick = hitHandler; let finish = (win) => { if(battleOver) return; battleOver=true; clearInterval(interval); let timeSpent = (Date.now() - battleStartTime) / 1000; if(win) { let oldPower = gameState.power; gameState.power = Math.floor(gameState.power * 2); let moneyReward = 500 + oldPower * 5; gameState.money += moneyReward; gameState.wins++; if(gameState.club) addClubWin(gameState.club.name); let diamondsGain = Math.random()<0.25?Math.floor(Math.random()*5)+1:0; gameState.diamonds += diamondsGain; showMessage(`ПОБЕДА! Мощь ${oldPower}→${gameState.power}, +${moneyReward}💰 +${diamondsGain}💎 Время: ${timeSpent.toFixed(2)} сек`); updateQuestProgress('battles',1); updateBestBattleTime(timeSpent); addWinForLeague(); } else { gameState.losses++; showMessage("ПОРАЖЕНИЕ!"); } recalcPowerAndIncome(); updateUI(); persistGame(); setTimeout(()=>modal.classList.remove('active'),2000); }; document.getElementById('playerHits').innerText=0; document.getElementById('botHits').innerText=0; }
    function startBattle() { if(battleActive) return; startBattleWithTimer(); }
    function updateBestBattleTime(seconds) { if(gameState.bestBattleTime === null || seconds < gameState.bestBattleTime) { gameState.bestBattleTime = seconds; showMessage(`🏆 Новый рекорд! ${seconds.toFixed(2)} сек`); persistGame(); } let records = JSON.parse(localStorage.getItem('tuntun_battle_records')||'{}'); if(!records[currentUsername] || seconds < records[currentUsername]) { records[currentUsername] = seconds; localStorage.setItem('tuntun_battle_records', JSON.stringify(records)); } renderRecords(); }
    function renderRecords() { let container = document.getElementById('recordsContainer'); if(!container) return; let records = JSON.parse(localStorage.getItem('tuntun_battle_records')||'{}'); let sorted = Object.entries(records).sort((a,b)=>a[1]-b[1]).slice(0,10); let html = `<div>🏆 ТОП-10 РЕКОРДОВ (сек)</div><div>Ваш рекорд: ${gameState.bestBattleTime ? gameState.bestBattleTime.toFixed(2)+' сек' : '—'}</div>`; html += sorted.map(([name, time], i) => `<div class="record-item">${i+1}. ${name} — ${time.toFixed(2)} сек</div>`).join(''); container.innerHTML = html; }

    // ---------- КВЕСТЫ ----------
    function resetDailyQuestsIfNeeded(){ let today=new Date().toDateString(); if(!gameState.quests.lastDateStr) gameState.quests.lastDateStr=today; if(gameState.quests.lastDateStr!==today){ gameState.quests.tasks.forEach(t=>{t.progress=0; t.claimed=false;}); gameState.quests.lastDateStr=today; persistGame(); } }
    function updateQuestProgress(type,delta=1){ resetDailyQuestsIfNeeded(); gameState.quests.tasks.forEach(task=>{if(!task.claimed && task.type===type) task.progress=Math.min(task.need,task.progress+delta);}); renderQuestsModal(); }
    function claimQuest(idx){ let task=gameState.quests.tasks[idx]; if(!task.claimed && task.progress>=task.need){ if(task.rewardMoney) gameState.money+=task.rewardMoney; if(task.rewardDiamonds) gameState.diamonds+=task.rewardDiamonds; if(task.rewardPower) gameState.power+=task.rewardPower; if(task.rewardFrame) addFrame(task.rewardFrame); task.claimed=true; updateUI(); persistGame(); renderQuestsModal(); alert("Награда получена!"); } }
    function claimSubscribeQuest(){ let task=gameState.quests.tasks.find(t=>t.type==='subscribe'); if(!task.claimed && task.progress===0){ task.progress=1; task.claimed=true; gameState.money+=task.rewardMoney; persistGame(); updateUI(); renderQuestsModal(); alert("Награда за подписку +500000💰"); } }
    function renderQuestsModal(){ let container=document.getElementById('questsList'); if(!container) return; resetDailyQuestsIfNeeded(); container.innerHTML=gameState.quests.tasks.map((t,idx)=>`<div><div>${t.type==='clicks'?'🖱️ Накликать':t.type==='battles'?'⚔️ Боёв':t.type==='mom_birthday'?'🌸 Поздравить маму':t.type==='subscribe'?'📺 Подписаться':t.type} ${t.need}</div><div>${t.progress}/${t.need}</div><div class="quest-progress"><div class="quest-progress-fill" style="width:${(t.progress/t.need)*100}%"></div></div><div>Награда: ${t.rewardMoney?t.rewardMoney+'💰':''} ${t.rewardDiamonds?t.rewardDiamonds+'💎':''} ${t.rewardPower?t.rewardPower+'⚡':''} ${t.rewardFrame?t.rewardFrame:''}</div>${!t.claimed && t.progress>=t.need ? `<button class="claim-btn" data-qidx="${idx}">Забрать</button>` : (t.claimed?'✅':(t.type==='subscribe'?'<button id="subscribeBtn">Подписаться</button>':''))}</div>`).join(''); document.querySelectorAll('.claim-btn').forEach(btn=>btn.addEventListener('click',()=>claimQuest(parseInt(btn.dataset.qidx)))); let subBtn=document.getElementById('subscribeBtn'); if(subBtn) subBtn.addEventListener('click',()=>{ window.open(gameState.quests.tasks.find(t=>t.type==='subscribe').link, '_blank'); claimSubscribeQuest(); }); }

    // ---------- ДРУЗЬЯ, ПОДАРКИ ----------
    function getAvatarHtml(avatarBase64) { if(avatarBase64) return `<img src="${avatarBase64}" style="width:32px; height:32px; border-radius:50%; object-fit:cover; margin-right:8px;">`; return `<span style="font-size:24px; margin-right:8px;">${gameState.selectedAvatar || '👤'}</span>`; }
    function sendGift(friendName) { let last = gameState.lastGiftSend[friendName]||0; if(Date.now()-last<24*3600000) { showMessage("Подарок раз в 24 часа"); return; } let st = loadGameFromStorage(friendName); if(st) { st.money+=5000; st.diamonds+=5; saveGameToStorage(friendName,st); gameState.lastGiftSend[friendName]=Date.now(); persistGame(); showMessage(`Подарок ${friendName}: 5000💰 +5💎`); updateUI(); } else showMessage("Друг не найден"); }

    // ---------- КЛУБЫ ----------
    function getClubsDB(){return JSON.parse(localStorage.getItem('tuntun_clubs')||'{}');}
    function saveClubsDB(clubs){localStorage.setItem('tuntun_clubs',JSON.stringify(clubs));}
    function createClub(clubName,leader){ let clubs=getClubsDB(); if(clubs[clubName]) return false; clubs[clubName]={name:clubName,leader:leader,members:[leader],wins:0,createdAt:Date.now()}; saveClubsDB(clubs); return true; }
    function joinClub(clubName,username){ let clubs=getClubsDB(); if(!clubs[clubName]||clubs[clubName].members.includes(username)) return false; clubs[clubName].members.push(username); saveClubsDB(clubs); return true; }
    function addClubWin(clubName){ let clubs=getClubsDB(); if(clubs[clubName]){ clubs[clubName].wins++; saveClubsDB(clubs); } }
    function renderClubUI() { let infoDiv = document.getElementById('clubInfo'); let actionsDiv = document.getElementById('clubActions'); if(!infoDiv) return; if(!gameState.club) { infoDiv.innerHTML = `<p>Вы не в клубе.</p><input id="newClubName" class="admin-input" placeholder="Название клуба" maxlength="20"><button id="createClubBtn">Создать (1м монет)</button><br><input id="joinClubName" class="admin-input" placeholder="Название"><button id="joinClubBtn">Вступить</button>`; document.getElementById('createClubBtn')?.addEventListener('click',()=>{ let name = document.getElementById('newClubName').value.trim(); if(name && gameState.money >= 1000000 && createClub(name, currentUsername)) { gameState.money -= 1000000; gameState.club = { name: name, role: 'leader' }; persistGame(); updateUI(); renderClubUI(); showMessage(`Клуб "${name}" создан!`); } else showMessage("Ошибка"); }); document.getElementById('joinClubBtn')?.addEventListener('click',()=>{ let name = document.getElementById('joinClubName').value.trim(); if(name && joinClub(name, currentUsername)) { gameState.club = { name: name, role: 'member' }; persistGame(); updateUI(); renderClubUI(); showMessage(`Вы вступили в ${name}`); } else showMessage("Ошибка"); }); } else { let clubs = getClubsDB(); let clubData = clubs[gameState.club.name]; let membersHtml = ''; if(clubData && clubData.members) { membersHtml = clubData.members.map(m => `<div class="club-member">${getAvatarHtml(loadGameFromStorage(m)?.avatarBase64)}<span>${m}${m === clubData.leader ? ' (лидер)' : ''}</span></div>`).join(''); } infoDiv.innerHTML = `<h3>🏠 Клуб: ${gameState.club.name}</h3><p>🏆 Побед клуба: ${clubData?.wins||0}</p>`; actionsDiv.innerHTML = `<div><button class="club-tab-btn" data-tab="members">Состав</button><button class="club-tab-btn" data-tab="global">Топ клубов</button></div><div id="clubTabContent">${membersHtml}</div>`; if(gameState.club.role === 'leader') { actionsDiv.innerHTML += `<button id="inviteFriendBtn">Пригласить друга (ссылка)</button><div id="inviteLink"></div>`; document.getElementById('inviteFriendBtn')?.addEventListener('click',()=>{ let link = `${window.location.origin}${window.location.pathname}?invite=${gameState.club.name}`; document.getElementById('inviteLink').innerHTML = `<input value="${link}" readonly><button id="copyInvite">Копировать</button>`; document.getElementById('copyInvite')?.addEventListener('click',()=>{ navigator.clipboard.writeText(link); showMessage("Ссылка скопирована"); }); }); } document.querySelectorAll('.club-tab-btn').forEach(btn => { btn.addEventListener('click', () => { let tab = btn.dataset.tab; let contentDiv = document.getElementById('clubTabContent'); if(tab === 'members') { let members = clubData.members.map(m => `<div class="club-member">${getAvatarHtml(loadGameFromStorage(m)?.avatarBase64)}<span>${m}${m === clubData.leader ? ' (лидер)' : ''}</span></div>`).join(''); contentDiv.innerHTML = members; } else if(tab === 'global') { let topClubs = Object.values(getClubsDB()).sort((a,b)=>b.wins - a.wins); let html = topClubs.map(c => `<div class="leaderboard-item"><span>${c.name}</span><span>🏆 ${c.wins}</span></div>`).join(''); contentDiv.innerHTML = html; } }); }); } let leaderDivElem = document.getElementById('clubLeaderboard'); if(leaderDivElem) { let topClubs = Object.values(getClubsDB()).sort((a,b)=>b.wins - a.wins); leaderDivElem.innerHTML = `<h4>🏅 Рейтинг клубов</h4>` + topClubs.map(c=>`<div class="leaderboard-item"><span>${c.name}</span><span>🏆${c.wins}</span></div>`).join(''); } }

    // ---------- ЧАТ ----------
    function loadChat() { let saved = localStorage.getItem('tuntun_chat'); if(saved) chatMessages = JSON.parse(saved); else chatMessages = []; }
    function saveChat() { if(chatMessages.length > 200) chatMessages = chatMessages.slice(-200); localStorage.setItem('tuntun_chat', JSON.stringify(chatMessages)); }
    function sendChatMessage(text) { if(!currentUsername || !text.trim()) return; let msg = { username: currentUsername, text: text.trim(), time: Date.now() }; chatMessages.push(msg); saveChat(); renderChat(); }

    // ---------- АДМИН-ПАНЕЛЬ (расширенная) ----------
    function initAdminPanel() {
        if(adminPanelCreated) return;
        let panelDiv = document.getElementById('adminPanel');
        if(!panelDiv) return;
        panelDiv.innerHTML = `
            <div class="admin-item"><h3>Выдача ресурсов</h3><input id="adminTarget" class="admin-input" placeholder="Ник"><input id="adminMoneyGive" class="admin-input" placeholder="Монеты" value="0"><input id="adminDiamondsGive" class="admin-input" placeholder="Алмазы" value="0"><input id="adminPowerGive" class="admin-input" placeholder="Мощь" value="0"><button id="adminGiveBtn">Выдать</button></div>
            <div class="admin-item"><h3>Очистка аккаунта</h3><input id="adminResetUser" class="admin-input" placeholder="Ник для сброса"><button id="adminResetProgressBtn">Сбросить прогресс</button><button id="adminWipeAllBtn">⚠️ ОЧИСТИТЬ ВСЕ АККАУНТЫ</button></div>
            <div class="admin-item"><h3>Блокировка</h3><input id="adminBanUser" class="admin-input" placeholder="Ник"><button id="adminBanBtn">Заблокировать</button><button id="adminUnbanBtn">Разблокировать</button></div>
            <div class="admin-item"><h3>Управление админами</h3><input id="newAdminName" class="admin-input" placeholder="Ник нового админа"><input id="newAdminPass" class="admin-input" type="password" placeholder="Пароль"><button id="addAdminBtn">Добавить админа</button><br><input id="delAdminName" class="admin-input" placeholder="Ник админа для удаления"><button id="delAdminBtn">Удалить админа</button><div id="adminList">Текущие админы: ${Object.keys(ADMINS).join(', ')}</div></div>
            <div class="admin-item"><h3>Управление промокодами</h3><input id="promoCodeName" class="admin-input" placeholder="Код"><select id="promoType"><option value="money">Монеты</option><option value="diamonds">Алмазы</option><option value="power">Сила</option><option value="frame">Рамка</option></select><input id="promoAmount" class="admin-input" placeholder="Количество / название рамки"><button id="createPromoBtn">Создать промокод</button><select id="delPromoSelect"></select><button id="delPromoBtn">Удалить промокод</button></div>
            <div class="admin-item"><h3>Выдача карточек</h3><input id="adminCardUser" class="admin-input" placeholder="Ник игрока"><input id="adminCardId" class="admin-input" placeholder="ID карточки (0-199)"><button id="giveCardBtn">Выдать карточку</button></div>
            <div class="admin-item"><h3>Выдача скинов</h3><input id="adminSkinUser" class="admin-input" placeholder="Ник игрока"><input id="adminSkinId" class="admin-input" placeholder="ID скина (frame_fire, click_star, avatar_dragon...)"><button id="giveSkinBtn">Выдать скин</button></div>
            <div id="adminResultMsg" style="margin-top:10px;color:#ffb347;"></div>`;
        let delSelect = document.getElementById('delPromoSelect');
        function refreshPromoSelect() { delSelect.innerHTML = ''; for(let code in promoList) { let opt = document.createElement('option'); opt.value = code; opt.textContent = code; delSelect.appendChild(opt); } }
        refreshPromoSelect();
        document.getElementById('createPromoBtn').addEventListener('click', () => {
            let code = document.getElementById('promoCodeName').value.trim();
            let type = document.getElementById('promoType').value;
            let amount = document.getElementById('promoAmount').value.trim();
            if(!code) { document.getElementById('adminResultMsg').innerText="Введите код"; return; }
            let reward = {};
            if(type === 'money') reward.money = parseInt(amount) || 0;
            else if(type === 'diamonds') reward.diamonds = parseInt(amount) || 0;
            else if(type === 'power') reward.power = parseInt(amount) || 0;
            else if(type === 'frame') reward.frame = amount;
            if(addPromo(code, reward)) { document.getElementById('adminResultMsg').innerText=`Промокод ${code} создан`; refreshPromoSelect(); }
            else document.getElementById('adminResultMsg').innerText="Код уже существует";
        });
        document.getElementById('delPromoBtn').addEventListener('click', () => {
            let code = delSelect.value;
            if(code) { removePromo(code); refreshPromoSelect(); document.getElementById('adminResultMsg').innerText=`Промокод ${code} удалён`; }
        });
        document.getElementById('adminGiveBtn').addEventListener('click',()=>{
            let t=document.getElementById('adminTarget').value.trim();
            let m=parseInt(document.getElementById('adminMoneyGive').value)||0;
            let d=parseInt(document.getElementById('adminDiamondsGive').value)||0;
            let p=parseInt(document.getElementById('adminPowerGive').value)||0;
            if(!t) return;
            let st=loadGameFromStorage(t);
            if(st){ st.money+=m; st.diamonds+=d; st.power+=p; saveGameToStorage(t,st); if(t===currentUsername){gameState=st; updateUI();} document.getElementById('adminResultMsg').innerText="Готово";}
            else document.getElementById('adminResultMsg').innerText="Не найден";
        });
        document.getElementById('adminResetProgressBtn').addEventListener('click',()=>{
            let t=document.getElementById('adminResetUser').value.trim();
            if(t){ let fresh=createEmptyGameState(); fresh.playerName=t; saveGameToStorage(t,fresh); if(t===currentUsername){gameState=fresh; updateUI();} document.getElementById('adminResultMsg').innerText=`Сброшен ${t}`; }
        });
        document.getElementById('adminWipeAllBtn').addEventListener('click',()=>{
            if(confirm("Очистить ВСЕ аккаунты?")){
                for(let un in getUsersDB()){ let fresh=createEmptyGameState(); fresh.playerName=un; saveGameToStorage(un,fresh); }
                if(currentUsername){gameState=createEmptyGameState(); gameState.playerName=currentUsername; updateUI();}
                document.getElementById('adminResultMsg').innerText="Все очищено";
            }
        });
        document.getElementById('adminBanBtn').addEventListener('click',()=>{
            let t=document.getElementById('adminBanUser').value.trim();
            if(t && !ADMINS[t]) setBan(t,true);
            document.getElementById('adminResultMsg').innerText=t ? `${t} заблокирован` : '';
        });
        document.getElementById('adminUnbanBtn').addEventListener('click',()=>{
            let t=document.getElementById('adminBanUser').value.trim();
            if(t) setBan(t,false);
            document.getElementById('adminResultMsg').innerText=t ? `${t} разблокирован` : '';
        });

            let name = document.getElementById('newAdminName').value.trim();
            let pass = document.getElementById('newAdminPass').value;
            if(name && pass && addAdmin(name, pass)) {
                document.getElementById('adminResultMsg').innerText=`Админ ${name} добавлен`;
                document.getElementById('adminList').innerHTML = `Текущие админы: ${Object.keys(ADMINS).join(', ')}`;
            } else document.getElementById('adminResultMsg').innerText="Ошибка добавления";
        });
        document.getElementById('delAdminBtn').addEventListener('click',()=>{
            let name = document.getElementById('delAdminName').value.trim();
            if(name && removeAdmin(name)) {
                document.getElementById('adminResultMsg').innerText=`Админ ${name} удалён`;
                document.getElementById('adminList').innerHTML = `Текущие админы: ${Object.keys(ADMINS).join(', ')}`;
            } else document.getElementById('adminResultMsg').innerText="Нельзя удалить или не найден";
        });
        document.getElementById('giveCardBtn')?.addEventListener('click', () => {
            let target = document.getElementById('adminCardUser').value.trim();

                document.getElementById('adminResultMsg').innerText = "Неверный ник или ID карты";
                return;
            }
            let st = loadGameFromStorage(target);
            if (!st) { document.getElementById('adminResultMsg').innerText = "Игрок не найден"; return; }
            if (!st.cards) st.cards = {};
            let card = allCards.find(c => c.id === cardId);
            if (!card) { document.getElementById('adminResultMsg').innerText = "Карта не найдена"; return; }
            if (st.cards[cardId]) {
                let reward = RARITY_SHARDS[card.rarity];
                st.money += reward;
                showMessage(`Игроку ${target} выдан дубликат карты, +${reward}💰`);
            } else {
                st.cards[cardId] = 1;
                showMessage(`Игроку ${target} выдана новая карта #${cardId}`);
            }
            saveGameToStorage(target, st);
            if (target === currentUsername) gameState = st;
            document.getElementById('adminResultMsg').innerText = `Карточка выдана ${target}`;
            updateUI();
        });
        document.getElementById('giveSkinBtn')?.addEventListener('click', () => {
            let target = document.getElementById('adminSkinUser').value.trim();
            let skinId = document.getElementById('adminSkinId').value.trim();
            if (!target || !skinId) {
                document.getElementById('adminResultMsg').innerText = "Введите ник и ID скина";
                return;
            }
            let skin = SKINS.find(s => s.id === skinId);
            if (!skin) {
                document.getElementById('adminResultMsg').innerText = "Неизвестный ID скина";
                return;
            }
            let st = loadGameFromStorage(target);
            if (!st) { document.getElementById('adminResultMsg').innerText = "Игрок не найден"; return; }
            if (!st.ownedSkins) st.ownedSkins = ["Стандартная"];
            if (st.ownedSkins.includes(skinId)) {
                document.getElementById('adminResultMsg').innerText = "У игрока уже есть этот скин";
                return;
            }
            st.ownedSkins.push(skinId);
            if (skin.type === 'frame') {
                if (!st.ownedFrames) st.ownedFrames = ["Стандартная"];
                if (!st.ownedFrames.includes(skin.name)) st.ownedFrames.push(skin.name);
            }
            if (skin.type === 'clickEffect') st.selectedClickEffect = skin.effect;
            if (skin.type === 'avatar') st.selectedAvatar = skin.avatarUrl;
            saveGameToStorage(target, st);
            if (target === currentUsername) gameState = st;
            document.getElementById('adminResultMsg').innerText = `Скин ${skin.name} выдан ${target}`;
            updateUI();
        });
        adminPanelCreated = true;
    }

    // ---------- МАГАЗИН СКИНОВ, РАМКИ, АВАТАР ----------
    function updateFrameSelect() { 
        let select = document.getElementById('frameSelect'); 
        if(!select) return; 
        select.innerHTML = ''; 
        gameState.ownedFrames.forEach(f => { 
            let opt = document.createElement('option'); 
            opt.value = f; 
            opt.textContent = f; 
            if(f === gameState.selectedFrame) opt.selected = true; 
            setTooltip(opt, f, `Рамка ${f}`);
            select.appendChild(opt); 
        });

    // ---------- КАРТОЧКИ ----------
    function getUniqueCardsCount() { return Object.values(gameState.cards || {}).filter(cnt => cnt > 0).length; }
    function getPackPrice() { let unique = getUniqueCardsCount(); if(unique < 10) return 100; if(unique < 100) return 1000; return 10000; }
    function setTooltip(element, id, description) { element.setAttribute('data-tooltip', `${description} (ID: ${id})`); element.setAttribute('data-item-id', id); return element; }
    function openPack() {
        let price = getPackPrice();
        if(gameState.diamonds < price) { showMessage(`Не хватает алмазов! Нужно ${price}💎`); return; }
        gameState.diamonds -= price;
        let rnd = Math.random() * 100;
        let rarity;
        if(rnd < 50) rarity = 'common';
        else if(rnd < 80) rarity = 'rare';
        else if(rnd < 95) rarity = 'epic';
        else if(rnd < 99.99) rarity = 'legendary';
        else rarity = 'impossible';
        let possible = allCards.filter(c => c.rarity === rarity);
        if(possible.length===0) possible = allCards.filter(c=>c.rarity==='common');
        let card = possible[Math.floor(Math.random() * possible.length)];
        if(!gameState.cards) gameState.cards = {};
        let current = gameState.cards[card.id] || 0;
        if(current === 0) {
            gameState.cards[card.id] = 1;
            showMessage(`🎴 Новая карта! ${card.name} (${RARITY_NAMES[rarity]})`);
        } else {
            let reward = RARITY_SHARDS[rarity];
            gameState.money += reward;
            showMessage(`🔄 Дубликат! +${reward}💰 за ${card.name}`);
            gameState.cards[card.id] = current + 1;
        }
        if (gameState.packsOpened === undefined) gameState.packsOpened = 0;
        gameState.packsOpened++;
        updateAchievementPacksOpened();
        updateAchievementUniqueCards();
        persistGame();
        updateUI();
        renderCardsCollection();
        let uniqueCount = getUniqueCardsCount();
        if(uniqueCount === TOTAL_CARDS && !gameState.allCardsAchievement) {
            gameState.allCardsAchievement = true;
            ALL_FRAMES.forEach(f => addFrame(f));
            showMessage("🏆 ПОЗДРАВЛЯЮ! Вы собрали все карты! Теперь у вас все рамки и права блокировки игроков!");
            persistGame();
            updateUI();
        }
    }
    function renderCardsCollection() {
        let container = document.getElementById('cardsCollection');
        if(!container) return;
        if(!gameState.cards) gameState.cards = {};
        let unique = getUniqueCardsCount();
        let html = `<div>📊 Прогресс: ${unique}/${TOTAL_CARDS} (${Math.floor(unique/TOTAL_CARDS*100)}%)</div><div>💰 Цена пака: ${getPackPrice()}💎</div><button id="openPackBtn">🎲 Открыть пак</button><div class="card-grid" id="cardGrid"></div>`;
        container.innerHTML = html;
        let grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        for(let card of allCards) {
            let count = gameState.cards[card.id] || 0;
            let ownedClass = count>0 ? 'card-owned' : '';
            let rarityClass = '';
            if(card.rarity === 'common') rarityClass = 'rarity-common';
            else if(card.rarity === 'rare') rarityClass = 'rarity-rare';
            else if(card.rarity === 'epic') rarityClass = 'rarity-epic';
            else if(card.rarity === 'legendary') rarityClass = 'rarity-legendary';
            else if(card.rarity === 'impossible') rarityClass = 'rarity-impossible';
            let cardDiv = document.createElement('div');
            cardDiv.className = `card-item ${rarityClass} ${ownedClass}`;
            let icon = '';
            if(card.rarity === 'common') icon = '🟫';
            else if(card.rarity === 'rare') icon = '🟢';
            else if(card.rarity === 'epic') icon = '🟣';
            else if(card.rarity === 'legendary') icon = '🟡';
            else if(card.rarity === 'impossible') icon = '🔴';
            cardDiv.innerHTML = `<div style="font-size:28px;">${icon}</div><b>${card.name}</b><br>${RARITY_NAMES[card.rarity]} x${count}`;
            setTooltip(cardDiv, card.id, card.name);
            grid.appendChild(cardDiv);
        }
        document.getElementById('openPackBtn')?.addEventListener('click', openPack);
    }

    // ---------- КРИПТОВАЛЮТЫ ----------
    function getCoinsDB() { return JSON.parse(localStorage.getItem('tuntun_coins') || '{}'); }
    function saveCoinsDB(db) { localStorage.setItem('tuntun_coins', JSON.stringify(db)); }
    function createCoin(coinName) {
        if(gameState.diamonds < 5000) { showMessage("Нужно 5000 алмазов для создания монеты"); return false; }
        gameState.diamonds -= 5000;
        gameState.diamonds = Math.floor(gameState.diamonds);
        let id = Date.now() + '_' + currentUsername;
        let reserve = 5000;
        let supply = 50000;
        let k = reserve * supply;
        let coinsDB = getCoinsDB();
        if(coinsDB[id]) return false;
        coinsDB[id] = { owner: currentUsername, name: coinName, reserve, supply, k };
        saveCoinsDB(coinsDB);
        if(!gameState.coinBalances) gameState.coinBalances = {};
        if(!gameState.coinBalances[id]) gameState.coinBalances[id] = {};
        gameState.coinBalances[id][currentUsername] = supply;
        persistGame();
        showMessage(`Создана монета "${coinName}"! Вы получили ${supply} монет.`);
        renderExchange();
        return true;
    }
    function getCoinPrice(coin) { return coin.reserve / coin.supply; }
    function buyCoin(coinId, diamondsAmount) {
        let coinsDB = getCoinsDB();
        let coin = coinsDB[coinId];
        if(!coin) return;
        if(gameState.diamonds < diamondsAmount) { showMessage("Не хватает алмазов"); return; }
        let R = coin.reserve, S = coin.supply, k = coin.k;
        let newReserve = R + diamondsAmount;
        let newSupply = k / newReserve;
        let receivedCoins = S - newSupply;
        if(receivedCoins <= 0) { showMessage("Слишком маленькая сумма"); return; }
        coin.reserve = newReserve;
        coin.supply = newSupply;
        coin.k = k;
        saveCoinsDB(coinsDB);
        gameState.diamonds -= diamondsAmount;
        gameState.diamonds = Math.floor(gameState.diamonds);
        if(!gameState.coinBalances) gameState.coinBalances = {};
        if(!gameState.coinBalances[coinId]) gameState.coinBalances[coinId] = {};
        let prev = gameState.coinBalances[coinId][currentUsername] || 0;
        gameState.coinBalances[coinId][currentUsername] = prev + receivedCoins;
        persistGame();
        showMessage(`Куплено ${receivedCoins.toFixed(2)} монет за ${diamondsAmount}💎. Новая цена: ${(coin.reserve/coin.supply).toFixed(6)}💎/монета`);
        renderExchange();
    }
    function sellCoin(coinId, coinAmount) {
        let coinsDB = getCoinsDB();
        let coin = coinsDB[coinId];
        if(!coin) return;
        let balance = (gameState.coinBalances?.[coinId]?.[currentUsername] || 0);
        if(balance < coinAmount) { showMessage("Не хватает монет"); return; }
        let R = coin.reserve, S = coin.supply, k = coin.k;
        let newSupply = S + coinAmount;
        let newReserve = k / newSupply;
        let receivedDiamonds = R - newReserve;
        if(receivedDiamonds <= 0) { showMessage("Недостаточно ликвидности для продажи"); return; }
        coin.reserve = newReserve;
        coin.supply = newSupply;
        coin.k = k;
        saveCoinsDB(coinsDB);
        gameState.coinBalances[coinId][currentUsername] -= coinAmount;
        gameState.diamonds += Math.floor(receivedDiamonds);
        gameState.diamonds = Math.floor(gameState.diamonds);
        persistGame();
        showMessage(`Продано ${coinAmount} монет, получено ${receivedDiamonds.toFixed(2)}💎. Новая цена: ${(coin.reserve/coin.supply).toFixed(6)}💎/монета`);
        renderExchange();
    }
    function renderExchange() {
        let container = document.getElementById('exchangeContainer');
        if(!container) return;
        let coinsDB = getCoinsDB();
        let html = `<h3>Создать новую монету</h3><input id="newCoinName" placeholder="Название монеты" maxlength="20"><button id="createCoinBtn">Создать за 5000💎</button><hr><div id="coinsList"></div>`;
        container.innerHTML = html;
        let coinsList = document.getElementById('coinsList');
        coinsList.innerHTML = '';
        for(let id in coinsDB) {
            let coin = coinsDB[id];
            let price = getCoinPrice(coin);
            let myBalance = (gameState.coinBalances?.[id]?.[currentUsername] || 0);
            let coinDiv = document.createElement('div');
            coinDiv.className = 'coin-item';
            coinDiv.innerHTML = `<b>${coin.name}</b> (владелец: ${coin.owner})<br>💎 Резерв: ${coin.reserve.toFixed(2)} | 🪙 Эмиссия: ${coin.supply.toFixed(2)}<br>💲 Цена: ${price.toFixed(6)}💎/монета<br>Ваш баланс: ${myBalance.toFixed(2)} монет<br><div class="flex-row"><input type="number" id="buyAmount_${id}" placeholder="Алмазов" style="width:100px"><button class="buyCoinBtn" data-id="${id}">Купить</button><input type="number" id="sellAmount_${id}" placeholder="Монет" style="width:100px"><button class="sellCoinBtn" data-id="${id}">Продать</button></div></div>`;
            setTooltip(coinDiv, id, `Монета ${coin.name}`);
            coinsList.appendChild(coinDiv);
        }
        document.getElementById('createCoinBtn')?.addEventListener('click', () => {
            let name = document.getElementById('newCoinName').value.trim();
            if(name) createCoin(name);
            else showMessage("Введите название");
        });
        document.querySelectorAll('.buyCoinBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = btn.dataset.id;
                let amount = parseFloat(document.getElementById(`buyAmount_${id}`).value);
                if(!isNaN(amount) && amount > 0) buyCoin(id, amount);
            });
        });
        document.querySelectorAll('.sellCoinBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = btn.dataset.id;
                let amount = parseFloat(document.getElementById(`sellAmount_${id}`).value);
                if(!isNaN(amount) && amount > 0) sellCoin(id, amount);
            });
        });
    }

    // ---------- РЫНОК ----------
    function loadMarket() { let saved = localStorage.getItem('tuntun_market'); if(saved) marketLots = JSON.parse(saved); else marketLots = []; }
    function saveMarket() { localStorage.setItem('tuntun_market', JSON.stringify(marketLots)); }
    function createLot(type, itemId, priceDiamonds) {
        if(priceDiamonds <= 0) return false;
        if(type === 'card') {
            let card = allCards.find(c => c.id == itemId);
            if(!card) return false;
            let count = gameState.cards?.[itemId] || 0;
            if(count < 1) return false;
            gameState.cards[itemId]--;
        } else if(type === 'frame') {
            if(!gameState.ownedFrames.includes(itemId)) return false;
            let idx = gameState.ownedFrames.indexOf(itemId);
            if(idx !== -1) gameState.ownedFrames.splice(idx,1);
        } else if(type === 'avatar') {
            if(!gameState.ownedSkins?.includes(itemId)) return false;
            let idx = gameState.ownedSkins.indexOf(itemId);
            if(idx !== -1) gameState.ownedSkins.splice(idx,1);
        } else if(type === 'clickerSkin') {
            if(!gameState.ownedSkins?.includes(itemId)) return false;
            let idx = gameState.ownedSkins.indexOf(itemId);
            if(idx !== -1) gameState.ownedSkins.splice(idx,1);
        } else return false;
        marketLots.push({ id: Date.now()+Math.random(), seller: currentUsername, type, itemId, price: priceDiamonds, timestamp: Date.now() });
        saveMarket();
        persistGame();
        return true;
    }
    function buyLot(lotId) {
        let lot = marketLots.find(l => l.id == lotId);
        if(!lot) return;
        if(lot.seller === currentUsername) { showMessage("Нельзя купить свой лот"); return; }
        if(gameState.diamonds < lot.price) { showMessage("Не хватает алмазов"); return; }
        gameState.diamonds -= lot.price;
        gameState.diamonds = Math.floor(gameState.diamonds);
        if(lot.type === 'card') {
            if(!gameState.cards) gameState.cards = {};
            gameState.cards[lot.itemId] = (gameState.cards[lot.itemId] || 0) + 1;
        } else if(lot.type === 'frame') {
            if(!gameState.ownedFrames.includes(lot.itemId)) gameState.ownedFrames.push(lot.itemId);
        } else if(lot.type === 'avatar' || lot.type === 'clickerSkin') {
            if(!gameState.ownedSkins.includes(lot.itemId)) gameState.ownedSkins.push(lot.itemId);
        }
        let sellerState = loadGameFromStorage(lot.seller);
        if(sellerState) {
            sellerState.diamonds += lot.price;
            sellerState.diamonds = Math.floor(sellerState.diamonds);
            localStorage.setItem(`tuntun_game_${lot.seller}`, JSON.stringify(sellerState));
        }
        marketLots = marketLots.filter(l => l.id != lotId);
        saveMarket();
        persistGame();
        showMessage(`Куплено! -${lot.price}💎`);
        renderMarket();
        updateUI();
    }
    function renderMarket() {
        let container = document.getElementById('marketContainer');
        if(!container) return;
        let html = `<h3>Выставить на продажу</h3>
                    <div class="flex-row">
                        <select id="sellType"><option value="card">Карточка</option><option value="frame">Рамка</option><option value="avatar">Аватар</option><option value="clickerSkin">Скин кликера</option></select>
                        <input id="sellItemId" placeholder="ID предмета">
                        <input id="sellPrice" placeholder="Цена в 💎">
                        <button id="createLotBtn">Выставить</button>
                    </div>
                    <hr><h3>Активные лоты</h3><div id="activeLots"></div>`;
        container.innerHTML = html;
        let lotsContainer = document.getElementById('activeLots');
        lotsContainer.innerHTML = '';
        for(let lot of marketLots) {
            let itemName = '';
            if(lot.type === 'card') { let card = allCards.find(c => c.id == lot.itemId); itemName = card ? card.name : 'Карта'; }
            else itemName = lot.itemId;
            let lotDiv = document.createElement('div');
            lotDiv.className = 'listing-item';
            lotDiv.innerHTML = `${itemName} (${lot.type}) от ${lot.seller} за ${lot.price}💎
                                ${lot.seller !== currentUsername ? `<button class="buyLotBtn" data-id="${lot.id}">Купить</button>` : 'Ваш лот'}`;
            let tooltipText = `ID лота: ${lot.id} | Предмет: ${itemName} (${lot.type})`;
            setTooltip(lotDiv, lot.id, tooltipText);
            if(lot.seller !== currentUsername) {
                let btn = lotDiv.querySelector('.buyLotBtn');
                if(btn) btn.addEventListener('click', () => buyLot(lot.id));
            }
            lotsContainer.appendChild(lotDiv);
        }
        document.getElementById('createLotBtn')?.addEventListener('click', () => {
            let type = document.getElementById('sellType').value;
            let itemId = document.getElementById('sellItemId').value;
            let price = parseInt(document.getElementById('sellPrice').value);
            if(isNaN(price) || price <= 0) { showMessage("Цена должна быть >0"); return; }
            if(createLot(type, itemId, price)) showMessage("Лот выставлен");
            else showMessage("Ошибка: нет такого предмета");
            renderMarket();
        });

    function applyWeeklyTax(){ let now=Date.now(); if(now - gameState.lastWeeklyTax >= 7*24*3600000){ let taxMoney=Math.floor(gameState.money*0.25); let taxDiamonds=Math.floor(gameState.diamonds*0.25); gameState.money-=taxMoney; gameState.diamonds-=taxDiamonds; if(gameState.money<0) gameState.money=0; if(gameState.diamonds<0) gameState.diamonds=0; gameState.diamonds = Math.floor(gameState.diamonds); gameState.lastWeeklyTax=now; persistGame(); return {taxMoney,taxDiamonds}; } return null; }
    function checkAndClaimDailyStreak(){ let today=new Date().toDateString(); let lastDate=gameState.lastStreakClaim?new Date(gameState.lastStreakClaim).toDateString():null; if(lastDate===today) return {canClaim:false, message:"Уже получено"}; let yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1); let isConsecutive=(lastDate===yesterday.toDateString()); if(gameState.dailyStreak===0||isConsecutive){ if(!isConsecutive && gameState.dailyStreak>0) gameState.dailyStreak=0; gameState.dailyStreak++; } else gameState.dailyStreak=1; let rewardMoney=500+gameState.dailyStreak*100; let rewardDiamonds=Math.floor(gameState.dailyStreak/5); gameState.money+=rewardMoney; gameState.diamonds+=rewardDiamonds; if(gameState.dailyStreak===7) addFrame("✨Рамка серии✨"); if(gameState.dailyStreak===30) addFrame("🏆Рамка марафона🏆"); gameState.lastStreakClaim=Date.now(); persistGame(); updateUI(); updateAchievementStreak(); return {canClaim:true, rewardMoney, rewardDiamonds, streak:gameState.dailyStreak}; }
    function renderStreakModal(){ let div=document.getElementById('streakInfo'); if(!div) return; let today=new Date().toDateString(); let lastDate=gameState.lastStreakClaim?new Date(gameState.lastStreakClaim).toDateString():null; let canClaim=lastDate!==today; div.innerHTML=`<div>🔥 Серия: ${gameState.dailyStreak} дней</div><div>Награда: ${500+gameState.dailyStreak*100}💰 + ${Math.floor(gameState.dailyStreak/5)}💎</div>${canClaim?'<div>Можно забрать!</div>':'<div>Уже сегодня</div>'}`; }
    function applyPromoCode(code){ code=code.trim(); if(gameState.usedPromoCodes.includes(code)) return "Уже использован"; let reward = promoList[code]; if(!reward) return "Неверный код"; if(reward.money) gameState.money+=reward.money; if(reward.diamonds) gameState.diamonds+=reward.diamonds; if(reward.power) gameState.power+=reward.power; if(reward.frame) addFrame(reward.frame); gameState.usedPromoCodes.push(code); persistGame(); return `+${reward.money||0}💰 +${reward.diamonds||0}💎 +${reward.power||0}⚡ ${reward.frame?' +рамка':''}`; }

            <div class="tab-content" id="tab-chat"><h2>💬 ОБЩИЙ ЧАТ</h2><div class="chat-container"><div id="chatMessagesList" class="chat-messages"></div><div class="chat-input-area"><input id="chatInput" placeholder="Сообщение"><button id="chatSendBtn">Отправить</button></div></div></div>
            <div class="tab-content" id="tab-cards"><h2>📇 КОЛЛЕКЦИЯ КАРТ</h2><div id="cardsCollection"></div></div>
            <div class="tab-content" id="tab-exchange"><h2>💱 БИРЖА КРИПТОВАЛЮТ</h2><div id="exchangeContainer"></div></div>
            <div class="tab-content" id="tab-market"><h2>🏪 РЫНОК</h2><div id="marketContainer"></div></div>
            <div class="tab-content" id="tab-admin"><h2>🔧 Админ-панель</h2><div id="adminPanel"></div></div>
            <div class="tab-content" id="tab-profile"><h2>👤 Профиль</h2><div id="accountSwitcher"></div><div style="display:flex;align-items:center;gap:15px;"><div class="avatar-wrapper"><div id="avatarFrameWrapper" class="frame-border"><div class="avatar-click" id="avatarPreview">👤</div></div></div><div><strong id="profile-name"></strong><div id="frameDisplay"></div></div><button id="uploadAvatarBtn">📸 Загрузить аватар</button><input type="file" id="avatarInput" style="display:none"></div><div id="profile-info"></div><div class="frame-select"><select id="frameSelect"></select></div><button id="logoutButton">🚪 Выйти</button></div>
            <div class="bottom-nav" id="bottomNav"><button class="nav-btn active" data-tab="tab-clicker"><span class="nav-icon">🦎</span>Клик</button><button class="nav-btn" data-tab="tab-units"><span class="nav-icon">🗡️</span>Юниты</button><button class="nav-btn" data-tab="tab-battle"><span class="nav-icon">⚔️</span>Бой</button><button class="nav-btn" data-tab="tab-friends"><span class="nav-icon">👥</span>Друзья</button><button class="nav-btn" data-tab="tab-shop"><span class="nav-icon">💎</span>Магазин</button><button class="nav-btn" data-tab="tab-clubs"><span class="nav-icon">🏆</span>Клубы</button><button class="nav-btn" data-tab="tab-chat"><span class="nav-icon">💬</span>Чат</button><button class="nav-btn" data-tab="tab-cards"><span class="nav-icon">📇</span>Карты</button><button class="nav-btn" data-tab="tab-exchange"><span class="nav-icon">💱</span>Биржа</button><button class="nav-btn" data-tab="tab-market"><span class="nav-icon">🏪</span>Рынок</button><button class="nav-btn" data-tab="tab-profile"><span class="nav-icon">👤</span>Профиль</button></div>
        </div>
        <div id="battleModal" class="modal"><div class="modal-content battle-arena"><h2>⚔️ БОЙ</h2><div id="playerSphere" class="health-sphere">🐉<br><span class="hit-counter" id="playerHits">0</span>/50</div><div id="botSphere" class="health-sphere">🤖<br><span class="hit-counter" id="botHits">0</span>/50</div><button id="battleHitBtn">💥 УДАР!</button><button id="closeBattleModal">Закрыть</button></div></div>
        <div id="skinShopModal" class="modal"><div class="modal-content"><h2>🎨 МАГАЗИН СКИНОВ</h2><div id="skinShopList"></div><button id="closeSkinShop">Закрыть</button></div></div>
        <div id="leaderboardModal" class="modal"><div class="modal-content"><h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3><div id="leaderboardList"></div><button id="closeLeaderboard">Закрыть</button></div></div>
        <div id="questsModal" class="modal"><div class="modal-content"><h3>📋 КВЕСТЫ</h3><div id="questsList"></div><button id="closeQuests">Закрыть</button></div></div>
        <div id="promoModal" class="modal"><div class="modal-content"><h3>🎁 ПРОМО-КОДЫ</h3><input id="promoCode" placeholder="Промокод"><button id="applyPromo">Активировать</button><div id="promoMessage"></div><hr><button id="applyTaxBtn">Налог 25%</button><button id="closePromoModal">Закрыть</button></div></div>
        <div id="streakModal" class="modal"><div class="modal-content"><h3>📅 ЕЖЕДНЕВНАЯ СЕРИЯ</h3><div id="streakInfo"></div><button id="claimStreakBtn">Забрать</button><button id="closeStreak">Закрыть</button></div></div>`;
        document.getElementById('clickerImage').addEventListener('click', clickHandler);
        document.getElementById('fight-btn').addEventListener('click', startBattle);
        document.getElementById('skinShopBtn').addEventListener('click', openSkinShop);
        document.getElementById('skinsIcon').addEventListener('click', openSkinShop);
        document.getElementById('copy-link-btn').addEventListener('click',()=>navigator.clipboard.writeText(window.location.href));
        document.getElementById('logoutButton').addEventListener('click',()=>{ if(saveInterval) clearInterval(saveInterval); currentUsername=null; gameState=null; showAuthModal(); });
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(btn.dataset.tab).classList.add('active'); }));
        document.getElementById('closeBattleModal').addEventListener('click',()=>document.getElementById('battleModal').classList.remove('active'));
        document.getElementById('closeSkinShop').addEventListener('click',()=>document.getElementById('skinShopModal').classList.remove('active'));
        document.getElementById('closeLeaderboard').addEventListener('click',()=>document.getElementById('leaderboardModal').classList.remove('active'));
        document.getElementById('closeQuests').addEventListener('click',()=>document.getElementById('questsModal').classList.remove('active'));
        document.getElementById('closePromoModal').addEventListener('click',()=>document.getElementById('promoModal').classList.remove('active'));
        document.getElementById('closeStreak').addEventListener('click',()=>document.getElementById('streakModal').classList.remove('active'));
        document.getElementById('applyPromo').addEventListener('click',()=>{ let code=document.getElementById('promoCode').value; let msg=applyPromoCode(code); document.getElementById('promoMessage').innerHTML=msg; if(msg.includes("+")) updateUI(); });
        document.getElementById('applyTaxBtn').addEventListener('click',()=>{ let tax=applyWeeklyTax(); if(tax){ document.getElementById('promoMessage').innerHTML=`Налог: -${tax.taxMoney}💰 -${tax.taxDiamonds}💎`; updateUI(); } else document.getElementById('promoMessage').innerHTML="Налог уже был"; });
        document.getElementById('claimStreakBtn').addEventListener('click',()=>{ let res=checkAndClaimDailyStreak(); if(res.canClaim) alert(`+${res.rewardMoney}💰 +${res.rewardDiamonds}💎 Серия ${res.streak}`); else alert(res.message); renderStreakModal(); updateUI(); document.getElementById('streakModal').classList.remove('active'); });
        document.getElementById('questsIcon').addEventListener('click',()=>{ renderQuestsModal(); document.getElementById('questsModal').classList.add('active'); });
        document.getElementById('leaderboardIcon').addEventListener('click',()=>{ showLeaderboardModal(); });
        document.getElementById('promoIcon').addEventListener('click',()=>{ let tax=applyWeeklyTax(); if(tax) document.getElementById('promoMessage').innerHTML=`Налог: -${tax.taxMoney}💰 -${tax.taxDiamonds}💎`; else document.getElementById('promoMessage').innerHTML='Налог не требуется'; document.getElementById('promoModal').classList.add('active'); });
        document.getElementById('streakIcon').addEventListener('click',()=>{ renderStreakModal(); document.getElementById('streakModal').classList.add('active'); });
        document.getElementById('chatSendBtn').addEventListener('click',()=>{ let inp=document.getElementById('chatInput'); if(inp.value.trim()) sendChatMessage(inp.value); inp.value=''; });
        document.getElementById('chatInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter'){ let inp=e.target; sendChatMessage(inp.value); inp.value=''; } });
        document.getElementById('loginBtn').addEventListener('click',()=>{ let u=document.getElementById('loginUsername').value.trim(); let p=document.getElementById('loginPassword').value; let res=loginUser(u,p); if(res){ addSavedAccount(u); switchToAccount(u); } else document.getElementById('authMessage').innerText="Ошибка входа (возможно, аккаунт заблокирован)"; });
        document.getElementById('registerBtn').addEventListener('click',()=>{ let u=document.getElementById('loginUsername').value.trim(); let p=document.getElementById('loginPassword').value; if(registerUser(u,p)){ let res=loginUser(u,p); if(res){ addSavedAccount(u); switchToAccount(u); } } else document.getElementById('authMessage').innerText="Регистрация не удалась (ник или пароль короче 3 символов, либо ник уже занят)"; });
        setupAvatarUpload();
        loadChat();
        loadMarket();
        let last = getLastAccount();
        if(last && loadGameFromStorage(last)) switchToAccount(last);
        else if(getSavedAccounts().length > 0) switchToAccount(getSavedAccounts()[0]);
        else showAuthModal();
        setInterval(()=>{ if(gameState && currentUsername){ let delta=Math.floor((Date.now()-sessionStartTime)/1000); gameState.totalPlayTime+=delta; sessionStartTime=Date.now(); persistGame(); updateUI(); } }, 60000);
        setInterval(()=>{ if(gameState && currentUsername){ let inc=gameState.incomePerMinute/60; if(inc>0){ gameState.money+=inc; updateUI(); persistGame(); } } }, 1000);
        if(isMomBirthday() && !momEventActive) setTimeout(()=>activateMomEvent(),500);
        // Принудительно скрываем загрузку через 2 секунды на случай ошибок
        setTimeout(()=>{ let loader = document.getElementById('globalLoading'); if(loader) loader.classList.add('hidden'); }, 2000);
    }
    buildApp();
</script>
</body>
</html>
